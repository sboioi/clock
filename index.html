<link rel="manifest" href="./manifest.json">
<style>
  :root{
    --ink:#1C2333;
    --ink-soft:#2B3350;
    --paper:#F6F0E2;
    --paper-card:#EFE7D3;
    --stamp-red:#C4402B;
    --stamp-red-dark:#9E3220;
    --brass:#B8912F;
    --steel:#7A8194;
    --green:#3F7D5C;
    --line:#D8CDAE;
    /* 用返裝置本身內建嘅字體，唔靠外部下載（Google Fonts需要上網先攞到），
       等呢個app可以完全離線／喺冇網絡嘅環境都正常顯示。 */
    --font-sans: -apple-system, BlinkMacSystemFont, 'PingFang HK', 'Microsoft JhengHei', 'Noto Sans CJK HK', 'Segoe UI', Roboto, sans-serif;
    --font-mono: ui-monospace, 'SF Mono', 'Cascadia Code', 'Segoe UI Mono', Consolas, 'DejaVu Sans Mono', monospace;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color: transparent;}
  html,body{margin:0; height:100%; overflow:hidden;}
  body{
    font-family:var(--font-sans);
    background:var(--paper);
    color:var(--ink);
    height:100vh;
    display:flex;
    flex-direction:column;
  }
  .mono{ font-family:var(--font-mono); }

  /* ---------- HEADER ---------- */
  header{
    background:var(--ink);
    color:var(--paper);
    padding:18px 22px;
    display:flex;
    align-items:center;
    justify-content:space-between;
    flex-shrink:0;
  }
  header .title{
    font-weight:900;
    font-size:20px;
    letter-spacing:1px;
    display:flex;
    align-items:center;
    gap:10px;
  }
  header .title .dot{
    width:9px;height:9px;border-radius:50%;
    background:var(--stamp-red);
    box-shadow:0 0 0 3px rgba(196,64,43,0.25);
  }
  header .clock{
    font-family:var(--font-mono);
    font-size:15px;
    color:var(--paper);
    opacity:0.85;
    letter-spacing:1px;
  }
  header .gear{
    background:none;border:1px solid rgba(246,240,226,0.3);
    color:var(--paper); border-radius:8px;
    width:38px;height:38px; font-size:16px; cursor:pointer;
  }

  main{ flex:1; overflow-y:auto; padding:22px; }

  /* ---------- KIOSK GRID ---------- */
  .grid{
    display:grid;
    grid-template-columns:repeat(auto-fill, minmax(150px,1fr));
    gap:16px;
    max-width:900px;
    margin:0 auto;
  }
  .ticket{
    position:relative;
    background:var(--paper-card);
    border:1.5px solid var(--line);
    border-radius:6px;
    padding:18px 14px 16px;
    cursor:pointer;
    text-align:center;
    transition:transform .12s ease, box-shadow .12s ease;
    box-shadow:0 2px 0 var(--line);
  }
  .ticket:active{ transform:translateY(2px); box-shadow:0 0px 0 var(--line); }
  .ticket::before, .ticket::after{
    content:''; position:absolute; width:14px; height:14px;
    background:var(--paper); border-radius:50%; top:50%; margin-top:-7px;
  }
  .ticket::before{ left:-7px; }
  .ticket::after{ right:-7px; }
  .ticket .status-dot{
    width:10px;height:10px;border-radius:50%;
    margin:0 auto 10px;
    background:var(--steel);
  }
  .ticket.on .status-dot{ background:var(--green); box-shadow:0 0 0 4px rgba(63,125,92,0.18); }
  .ticket .name{ font-weight:700; font-size:17px; margin-bottom:6px; }
  .ticket .state-label{ font-size:12.5px; color:var(--steel); letter-spacing:0.5px; }
  .ticket.on .state-label{ color:var(--green); font-weight:500; }
  .ticket .last-time{ margin-top:10px; font-size:11px; color:var(--steel); font-family:var(--font-mono); }

  .empty-state{
    text-align:center; margin-top:60px; color:var(--steel);
  }
  .empty-state button{ margin-top:14px; }

  /* ---------- STAMP MODAL ---------- */
  .overlay{
    position:fixed; inset:0; background:rgba(28,35,51,0.55);
    display:flex; align-items:center; justify-content:center;
    z-index:50; opacity:0; pointer-events:none; transition:opacity .15s ease;
  }
  .overlay.show{ opacity:1; pointer-events:auto; }
  .stamp-card{
    background:var(--paper); border-radius:10px; padding:34px 40px;
    text-align:center; min-width:260px;
    transform:scale(0.7) rotate(-8deg); opacity:0;
    transition:transform .28s cubic-bezier(.2,1.4,.4,1), opacity .2s ease;
    border:2px solid var(--ink);
  }
  .overlay.show .stamp-card{ transform:scale(1) rotate(-3deg); opacity:1; }
  .stamp-card .stamp-word{
    font-size:26px; font-weight:900; letter-spacing:2px;
    padding:6px 18px; display:inline-block;
    border:3px solid var(--stamp-red); color:var(--stamp-red);
    border-radius:6px; margin-bottom:14px;
  }
  .stamp-card .stamp-name{ font-size:18px; font-weight:700; margin-bottom:4px; }
  .stamp-card .stamp-time{ font-family:var(--font-mono); font-size:22px; color:var(--ink-soft); }

  /* ---------- BUTTONS ---------- */
  button{ font-family:inherit; }
  .btn{
    background:var(--ink); color:var(--paper); border:none;
    padding:11px 18px; border-radius:8px; font-size:14.5px; font-weight:500;
    cursor:pointer;
  }
  .btn.red{ background:var(--stamp-red); }
  .btn.ghost{ background:transparent; border:1.5px solid var(--line); color:var(--ink); }
  .btn.sm{ padding:7px 12px; font-size:13px; }

  /* ---------- PIN SCREEN ---------- */
  .pin-screen{ max-width:280px; margin:40px auto; text-align:center; }
  .pin-dots{ display:flex; gap:12px; justify-content:center; margin:22px 0; }
  .pin-dots span{ width:14px;height:14px;border-radius:50%; border:1.5px solid var(--ink); }
  .pin-dots span.filled{ background:var(--ink); }
  .pin-pad{ display:grid; grid-template-columns:repeat(3,1fr); gap:10px; }
  .pin-pad button{
    padding:16px 0; border-radius:8px; border:1.5px solid var(--line);
    background:var(--paper-card); font-size:19px; font-weight:600; cursor:pointer;
    font-family:var(--font-mono);
  }
  .pin-error{ color:var(--stamp-red); font-size:13px; height:18px; margin-top:4px;}

  /* ---------- ADMIN ---------- */
  .tabs{ display:flex; gap:8px; max-width:900px; margin:0 auto 18px; }

<script>
const STORAGE_KEY = 'clock-data';
let DATA = { employees: [], punches: [], pin: '1234', holidays: [] };
let view = 'kiosk'; // kiosk | pin | admin
let adminTab = 'employees';
let pinBuffer = '';

const $main = document.getElementById('main');

// ==================== 通用工具 function ====================
function csvEscape(val){
  let s = String(val===undefined || val===null ? '' : val);
  // CSV injection 防護：如果內容開頭係 = + - @ 呢類字元，Excel/Google Sheets
  // 打開嗰陣可能當佢係公式執行。呢啲欄位大多數係管理員自己打嘅員工名／假期名，
  // 風險唔高，但都加返個「'」中和，costs nothing、防人於未然。
  if(/^[=+\-@\t\r]/.test(s)) s = "'" + s;
  return /[",\n]/.test(s) ? '"'+s.replace(/"/g,'""')+'"' : s;
}
function downloadCSV(filename, rows){
  const csv = rows.map(r=> r.map(csvEscape).join(',')).join('\r\n');
  // 有啲環境（例如sandbox瀏覽器）會靜靜雞擋咗程式自動觸發嘅下載，冇任何錯誤提示。
  // 所以呢度照試下載，但唔理成唔成功，都一定彈返個窗俾用戶睇到／複製到啲資料做保底。
  try{
    const blob = new Blob(['\uFEFF'+csv], { type:'text/csv;charset=utf-8;' }); // 加BOM等Excel啱啱顯示中文
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url; a.download = filename;
    document.body.appendChild(a); a.click(); document.body.removeChild(a);
    setTimeout(()=> URL.revokeObjectURL(url), 1000);
  }catch(e){
    console.warn('自動下載失敗，改用手動複製方案', e);
  }
  showExportModal(filename, csv);
}

function showExportModal(filename, csvText){
  document.getElementById('exportTitle').textContent = filename;
  const ta = document.getElementById('exportTextarea');
  ta.value = csvText;
  document.getElementById('exportOverlay').classList.add('show');
  ta.focus(); ta.select();
}
document.getElementById('exportCloseBtn').addEventListener('click', ()=>{
  document.getElementById('exportOverlay').classList.remove('show');
});
document.getElementById('exportCopyBtn').addEventListener('click', async ()=>{
  const ta = document.getElementById('exportTextarea');
  ta.focus(); ta.select();
  let copied = false;
  try{
    if(navigator.clipboard && navigator.clipboard.writeText){
      await navigator.clipboard.writeText(ta.value);
      copied = true;
    }
  }catch(e){ /* fall through to execCommand */ }
  if(!copied){
    try{ copied = document.execCommand('copy'); }catch(e){ copied = false; }
  }
  if(copied){
    showMessage('已複製', '資料已經複製晒，去Excel／記事本度貼低（Ctrl+V／Cmd+V）就可以儲存。');
  }else{
    showMessage('複製唔到，麻煩自己複製', '已經幫你全選咗文字框入面嘅內容，請自己用 Ctrl+C／Cmd+C 複製，再貼去Excel或者記事本。');
  }
});

function uid(){ return Date.now().toString(36) + Math.random().toString(36).slice(2,7); }

    overlay.classList.remove('show');

  okBtn.addEventListener('click', onOk);
  skipBtn.addEventListener('click', onSkip);
}

// 手動改動打咭紀錄嘅時候記低：改咗咩、邊個員工、幾時改、原因（可留空）。

function addAuditLog(action, emp, detail, reason){

    id: uid(), ts: Date.now(), action,
    employeeId: emp ? emp.id : '',

/* ---------------- CUSTOM MODALS (replace alert/confirm/prompt) ---------------- */

  const confirmBtn = document.getElementById('inputConfirmBtn');

/* ---------------- EMPLOYEE EDIT MODAL (name / wage / hire date) ---------------- */

document.getElementById('empEditSave').addEventListener('click', async ()=>{

    emp.name = name; emp.wage = wage; emp.hireDate = hireDate;

/* ---------------- STORAGE LAYER ----------------
   喺 Claude 介面入面打開，用官方提供嘅 window.storage（雲端，跨裝置同步）。
   每次儲存都會「順便」喺瀏覽器嘅 localStorage 都存多一份做本機備份，
   就算雲端一時連唔到，都唔會即刻冇晒資料；讀取時如果雲端攞唔到，都會
   試吓攞返本機嗰份。如果將個 .html 檔案拎出嚟獨立開（唔經Claude），
   會直接淨係用 localStorage（只存喺呢部裝置／呢個瀏覽器）。
------------------------------------------------- */
const usingNativeStorage = (typeof window.storage !== 'undefined' && window.storage !== null);
function localKey(key, shared){ return (shared?'shared:':'local:')+key; }

async function storageGet(key, shared){
  if(usingNativeStorage){
    try{
      const res = await window.storage.get(key, shared);
      if(res) return res;
    }catch(e){ console.warn('雲端讀取失敗，改用本機備份', e); }
  }
  try{
    const raw = localStorage.getItem(localKey(key, shared));
    return raw ? { key, value: raw, shared } : null;
  }catch(e){ return null; }
}

async function storageSet(key, value, shared){
  let cloudOk = false, cloudErr = null;
  if(usingNativeStorage){
    for(let attempt=0; attempt<2 && !cloudOk; attempt++){
      try{
        const result = await window.storage.set(key, value, shared);
        if(result) cloudOk = true;
      }catch(e){ cloudErr = e; }
      if(!cloudOk && attempt===0) await new Promise(r=>setTimeout(r, 500));
    }
  }
  let localOk = false, localErr = null;
  try{ localStorage.setItem(localKey(key, shared), value); localOk = true; }
  catch(e){ localErr = e; }

  return { cloudOk, localOk, error: cloudErr || localErr };
}

function sanitizeErrorMessage(err){
  if(!err) return '';
  const msg = (err && err.message) ? err.message : String(err);
  return msg.length > 80 ? msg.slice(0,80)+'…' : msg;
}

let saveFailCount = 0;

async function saveData(){
  const result = await storageSet(STORAGE_KEY, JSON.stringify(DATA), true);
  handleSaveResult(result);
}

function handleSaveResult(result){
  if(result.cloudOk || (!usingNativeStorage && result.localOk)){
    saveFailCount = 0;
    return; // 正常情況，唔使打擾用戶
  }
  if(usingNativeStorage && result.localOk){
    saveFailCount = 0;
    showMessage('雲端暫時連唔到', '資料已經確認暫存喺呢部裝置／瀏覽器，未同步到雲端。建議盡快重新打開呢個app一次，等佢有機會再同步（如果之後喺第二部裝置開，可能仲未見到呢次改動）。');
    return;
  }
  // 雲端同本機都存唔到
  console.error('儲存失敗，詳細錯誤：', result.error);
  saveFailCount++;
  const detail = result.error ? `（原因：${sanitizeErrorMessage(result.error)}）` : '';
  if(saveFailCount >= 3){
    showMessage('持續儲存失敗', `已經試咗${saveFailCount}次都未能儲存${detail}。建議檢查網絡連線，或者將呢個app喺Claude入面重新打開一次再試，唔好一直撳重試。`);
  }else{
    showConfirm('儲存失敗', `資料未能儲存${detail}，呢部裝置暫時亦都存唔到備份。撳「重試」可以再試一次。`, saveData, '重試');
  }
}

async function loadData(){
  try{
    const res = await storageGet(STORAGE_KEY, true);
    if(res && res.value){ DATA = JSON.parse(res.value); }
  }catch(e){ /* no data yet, use default */ }
  if(!DATA.pin) DATA.pin = '1234';
  if(!DATA.employees) DATA.employees = [];
  if(!DATA.punches) DATA.punches = [];
  if(!DATA.holidays) DATA.holidays = [];
  if(!DATA.auditLog) DATA.auditLog = [];
  DATA.employees.forEach(e=>{
    if(e.wage===undefined) e.wage = 0;
    if(e.hireDate===undefined) e.hireDate = '';
  });
}

// ==================== 時區處理：全部鎖死用 America/Vancouver ====================
// 呢個app係做BC《僱傭標準法》計糧，紅日/報表嘅「日」一定要用返舖頭所在嘅
// 太平洋時區嚟判斷，唔可以靠開個app嗰部裝置自己嘅系統時區設定（萬一裝置冇校啱，
// 或者管理員喺第二個時區開個app查報表，日子就會計錯）。
const SHOP_TZ = 'America/Vancouver';

// 攞返指定時區喺某一刻嘅UTC偏移（分鐘，溫哥華通常係負數，例如 -480/-420）
function tzOffsetMinutes(timeZone, utcMs){
  const dtf = new Intl.DateTimeFormat('en-US', {
    timeZone, hourCycle:'h23',
    year:'numeric', month:'2-digit', day:'2-digit',
    hour:'2-digit', minute:'2-digit', second:'2-digit'
  });
  const map = {};
  dtf.formatToParts(new Date(utcMs)).forEach(p=>{ if(p.type!=='literal') map[p.type]=p.value; });
  const asUTC = Date.UTC(map.year, map.month-1, map.day, map.hour, map.minute, map.second);
  return (asUTC - utcMs) / 60000;
}
// 將「溫哥華本地嘅牆鐘時間」(年,月,日,時,分,秒) 轉做正確嘅UTC毫秒時間戳
function vancouverWallTimeToMs(y, mo, d, h, mi, s){
  const naiveUTC = Date.UTC(y, mo-1, d, h, mi, s||0);
  const offset = tzOffsetMinutes(SHOP_TZ, naiveUTC);
  return naiveUTC - offset*60000;
}
// 將 <input type=date> 嘅 'YYYY-MM-DD' 字串，當做溫哥華當日 00:00，轉做時間戳
function parseVanDateStr(dateStr){
  const [y,mo,d] = dateStr.split('-').map(Number);
  return vancouverWallTimeToMs(y, mo, d, 0, 0, 0);
}
// 將 <input type=date> 嘅 'YYYY-MM-DD' 字串，當做溫哥華當日 23:59:59，轉做時間戳
function parseVanDateEndStr(dateStr){
  const [y,mo,d] = dateStr.split('-').map(Number);
  return vancouverWallTimeToMs(y, mo, d, 23, 59, 59);
}
// 將 <input type=datetime-local> 嘅 'YYYY-MM-DDTHH:mm' 字串，當做溫哥華時間，轉做時間戳
function parseVanDateTimeStr(dtStr){
  const [datePart, timePart] = dtStr.split('T');
  const [y,mo,d] = datePart.split('-').map(Number);
  const [h,mi] = timePart.split(':').map(Number);
  return vancouverWallTimeToMs(y, mo, d, h, mi, 0);
}

function fmtTime(ts){
  return new Date(ts).toLocaleTimeString('zh-HK', { hour:'2-digit', minute:'2-digit', second:'2-digit', hour12:false, timeZone:SHOP_TZ });
}
function fmtDate(ts){
  return new Date(ts).toLocaleDateString('zh-HK', { year:'numeric', month:'2-digit', day:'2-digit', timeZone:SHOP_TZ });
}
function dateKey(ts){
  const dtf = new Intl.DateTimeFormat('en-CA', { timeZone:SHOP_TZ, year:'numeric', month:'2-digit', day:'2-digit' });
  return dtf.format(new Date(ts)); // en-CA 本身就係 YYYY-MM-DD 格式
}

function isHoliday(dStr){
  return DATA.holidays.some(h=>h.date===dStr);
}
function holidayLabel(dStr){
  const h = DATA.holidays.find(h=>h.date===dStr);
  return h ? h.name : '';
}
// BC ESA s.46: 1.5x 首12小時，超過12小時部份 2x（呢個只計「有做嘢嗰段時間」嘅出糧時數，
// 唔包括另外仲要俾嘅 average day's pay，嗰個要按過去30日人工計，呢個app未計算）
function payableHours(actualHours){
  if(actualHours<=12) return actualHours*1.5;
  return 12*1.5 + (actualHours-12)*2;
}

/* ---------------- 薪金計算 (BC Employment Standards Act) ---------------- */
// 一星期由星期日開始計（BC ESA 常見預設 work week）
function getWeekStart(ts){
  const d = new Date(ts);
  d.setHours(0,0,0,0);
  d.setDate(d.getDate() - d.getDay());
  return d.getTime();
}

// 攞返員工喺 [fromTs, toTs] 之內、非紅日嘅每日時數，按日分組。
// 未完成（未打落班）嘅更唔計入時數/工資——因為用 Date.now() 計會令報表每次打開都唔同，
// 唔適合做「最終」薪金依據；但呢日仍然計入 hasOpen，等上層知道有更未完成，同計「有做嘢」嘅日數。
function dailyHoursExcludingHolidays(empId, fromTs, toTs){
  const shifts = computeShifts(empId, fromTs, toTs).filter(s=> !isHoliday(dateKey(s.inTs)));
  const days = {}; // dKey -> { hours, hasOpen }
  shifts.forEach(s=>{
    const dKey = dateKey(s.inTs);
    if(!days[dKey]) days[dKey] = { hours:0, hasOpen:false };
    if(s.outTs===null){
      days[dKey].hasOpen = true; // 未打落班，唔計時數，但當呢日有返過工
    }else{
      days[dKey].hours += (s.outTs - s.inTs)/3600000;
    }
  });
  return days;
}

// 一般（非紅日）工作嘅加班計算：
// 每日：首8小時正常，8-12小時×1.5，超過12小時×2
// 每週：一星期正常時數總和超過40小時，超出部份都要×1.5（同一段時數如果已經因為「每日」規則攞緊更高倍數，就唔會再疊加，攞較高者）
function computeRegularPay(empId, fromTs, toTs, wage){
  const days = dailyHoursExcludingHolidays(empId, fromTs, toTs);
  const openDates = Object.keys(days).filter(d=> days[d].hasOpen);
  const dayClass = {};
  Object.keys(days).forEach(dKey=>{
    const h = days[dKey].hours;
    dayClass[dKey] = {
      reg: Math.min(h,8),
      ot15: Math.min(Math.max(h-8,0),4),
      ot2: Math.max(h-12,0),
      ts: parseVanDateStr(dKey)
    };
  });
  const weeks = {};
  Object.values(dayClass).forEach(dc=>{
    const wk = getWeekStart(dc.ts);
    if(!weeks[wk]) weeks[wk] = {reg:0, ot15:0, ot2:0};
    weeks[wk].reg += dc.reg;
    weeks[wk].ot15 += dc.ot15;
    weeks[wk].ot2 += dc.ot2;
  });
  let totalReg=0, totalOt15=0, totalOt2=0, pay=0;
  Object.values(weeks).forEach(w=>{
    // 每週超過40小時嘅「正常」時數，改用1.5倍（如果嗰段時數已經因每日規則攞緊1.5/2倍，就唔受呢度影響）
    const weeklyExcess = Math.max(w.reg - 40, 0);
    const regKept = w.reg - weeklyExcess;
    totalReg += regKept;
    totalOt15 += w.ot15 + weeklyExcess;
    totalOt2 += w.ot2;
    pay += regKept*wage + (w.ot15+weeklyExcess)*wage*1.5 + w.ot2*wage*2;
  });
  return { totalReg, totalOt15, totalOt2, pay, totalHours: totalReg+totalOt15+totalOt2, openDates };
}

// 紅日之前30個曆日：實際做嘢嘅日數 + 嗰段時間嘅正常工資總額（唔計加班費）
// 「做嘢嘅日數」包括未打落班嗰日（起碼佢有返過工），但金額只計已經打完落班嘅時數，
// 避免未完成嘅更用而家時間計，令平均日薪唔穩定。
function wageHistoryBeforeHoliday(empId, holidayStartTs, wage){
  const fromTs = holidayStartTs - 30*86400000;
  const toTs = holidayStartTs - 1;
  const days = dailyHoursExcludingHolidays(empId, fromTs, toTs);
  const workedDays = Object.keys(days).length;
  const totalWages = Object.values(days).reduce((sum,d)=> sum + d.hours*wage, 0);
  return { workedDays, totalWages };
}

// 資格：受僱滿30曆日 + 之前30日內有15日有做嘢/出過糧
function isEligibleForHoliday(emp, holidayStartTs){
  if(emp.hireDate){
    const hireTs = parseVanDateStr(emp.hireDate);
    const employedDays = Math.floor((holidayStartTs - hireTs)/86400000);
    if(employedDays < 30) return false;
  }
  const { workedDays } = wageHistoryBeforeHoliday(emp.id, holidayStartTs, emp.wage||0);
  return workedDays >= 15;
}

// 單一紅日嘅出糧計算
function computeHolidayPay(emp, holidayDateStr){
  const wage = emp.wage || 0;
  const holidayStartTs = parseVanDateStr(holidayDateStr);
  const holidayEndTs = holidayStartTs + 86400000 - 1;
  const eligible = isEligibleForHoliday(emp, holidayStartTs);
  const { workedDays, totalWages } = wageHistoryBeforeHoliday(emp.id, holidayStartTs, wage);
  const avgDayPay = workedDays>0 ? totalWages/workedDays : 0;

  const shiftsOnHoliday = computeShifts(emp.id, holidayStartTs, holidayEndTs)
    .filter(s=> dateKey(s.inTs)===holidayDateStr);
  let hoursWorked = 0;
  let hasOpenShift = false;
  shiftsOnHoliday.forEach(s=>{
    if(s.outTs===null){ hasOpenShift = true; }
    else{ hoursWorked += (s.outTs - s.inTs)/3600000; }
  });

  let pay = 0, status = '';
  if(eligible){
    if(hoursWorked>0){
      pay = avgDayPay + payableHours(hoursWorked)*wage;
      status = `合資格・有返工 ${hoursWorked.toFixed(1)}h`;
    }else if(hasOpenShift){
      pay = avgDayPay;
      status = '合資格・返緊工（未打落班，暫時只計平均日薪，落班後要再check）';
    }else{
      pay = avgDayPay;
      status = '合資格・放假';
    }
  }else{
    if(hoursWorked>0){
      pay = hoursWorked*wage;
      status = `未合資格・有返工 ${hoursWorked.toFixed(1)}h（只計正常工資）`;
    }else if(hasOpenShift){
      pay = 0;
      status = '未合資格・返緊工（未打落班，暫未計出糧）';
    }else{
      pay = 0;
      status = '未合資格・冇返工（冇糧）';
    }
  }
  if(hasOpenShift){ status += ' ⏳未完成'; }
  return { eligible, avgDayPay, hoursWorked, pay, status, workedDays, hasOpenShift };
}

function lastPunchOf(empId){
  const list = DATA.punches.filter(p=>p.employeeId===empId).sort((a,b)=>a.ts-b.ts);
  return list.length ? list[list.length-1] : null;
}

// 逐筆打咭掃描，揪出：連續兩個「上班」中間冇「落班」、有「落班」但冇對應嘅「上班」、
// 同「上班」之後太耐（>16小時）都未見「落班」。回傳異常清單，方便管理員補正。
function detectAnomalies(empId){
  const list = DATA.punches.filter(p=>p.employeeId===empId).sort((a,b)=>a.ts-b.ts);
  const issues = [];
  let expect = 'in';
  list.forEach(p=>{
    if(p.type==='in'){
      if(expect==='out'){
        issues.push({ type:'double_in', ts:p.ts, detail:`${fmtDate(p.ts)} ${fmtTime(p.ts)}　連續兩個「上班」，中間冇「落班」` });
      }
      expect = 'out';
    }else{
      if(expect==='in'){
        issues.push({ type:'orphan_out', ts:p.ts, detail:`${fmtDate(p.ts)} ${fmtTime(p.ts)}　呢個「落班」冇對應嘅「上班」` });
      }else{
        expect = 'in';
      }
    }
  });
  if(expect==='out' && list.length){
    const last = list[list.length-1];
    const hoursOpen = (Date.now()-last.ts)/3600000;
    if(hoursOpen > 16){
      issues.push({ type:'long_open', ts:last.ts, detail:`${fmtDate(last.ts)} ${fmtTime(last.ts)}　打咗「上班」之後已經 ${hoursOpen.toFixed(1)} 小時未見「落班」` });
    }
  }
  return issues;
}

    $main.innerHTML = `

/* ---------------- EMPLOYEE IDENTITY CONFIRM (冇密碼，淨係確認係咪本人) ---------------- */
let pendingEmpId = null;

function openEmpConfirmModal(empId){
  const emp = DATA.employees.find(e=>e.id===empId);
  if(!emp) return;
  pendingEmpId = empId;
  const last = lastPunchOf(empId);
  const action = (last && last.type==='in') ? '落班' : '上班';
  document.getElementById('empConfirmName').textContent = emp.name;
  document.getElementById('empConfirmAction').textContent = `確定要打「${action}」？`;
  document.getElementById('empConfirmOverlay').classList.add('show');
}
function closeEmpConfirmModal(){
  document.getElementById('empConfirmOverlay').classList.remove('show');
  pendingEmpId = null;
}
document.getElementById('empConfirmCancel').addEventListener('click', closeEmpConfirmModal);
document.getElementById('empConfirmOk').addEventListener('click', async ()=>{
  const id = pendingEmpId;
  closeEmpConfirmModal();
  if(id) await handlePunch(id);
});

async function handlePunch(empId){
  const emp = DATA.employees.find(e=>e.id===empId);
  if(!emp) return;
  const last = lastPunchOf(empId);
  const type = (last && last.type==='in') ? 'out' : 'in';
  const ts = Date.now();
  DATA.punches.push({ id: uid(), employeeId: empId, type, ts });
  await saveData();
  showStamp(emp.name, type, ts);
  renderKiosk();
}

function showStamp(name, type, ts){
  document.getElementById('stampWord').textContent = type==='in' ? '上班' : '落班';
  document.getElementById('stampWord').style.borderColor = type==='in' ? 'var(--green)' : 'var(--stamp-red)';
  document.getElementById('stampWord').style.color = type==='in' ? 'var(--green)' : 'var(--stamp-red)';
  document.getElementById('stampName').textContent = name;
  document.getElementById('stampTime').textContent = fmtTime(ts);
  const overlay = document.getElementById('stampOverlay');
  overlay.classList.add('show');
  clearTimeout(window._stampTimer);
  window._stampTimer = setTimeout(()=> overlay.classList.remove('show'), 1300);
}

function escapeHtml(s){
  return s.replace(/[&<>"']/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

function updatePinDots(){
  document.getElementById('pinDots').innerHTML = [0,1,2,3].map(i=>
    `<span class="${i<pinBuffer.length?'filled':''}"></span>`).join('');
}
function checkPin(){
  if(pinBuffer === DATA.pin){
    pinBuffer=''; view='admin'; render();
  }else{
    document.getElementById('pinError').textContent = '密碼錯誤';
    setTimeout(()=>{ pinBuffer=''; updatePinDots(); document.getElementById('pinError').textContent=''; }, 500);
  }
}

    if(!val){ showMessage('請揀日期時間', '請先揀返個日期時間先可以新增。'); return; }
    const ts = parseVanDateTimeStr(val);
    if(isNaN(ts)){ showMessage('日期時間無效', '請重新揀過。'); return; }
    showTextPrompt('補登原因（可留空）', '例如：員工漏打落班，依家補返', async (reason)=>{
      DATA.punches.push({ id: uid(), employeeId: emp.id, type, ts });
      addAuditLog('新增打咭', emp, `新增 ${fmtDate(ts)} ${fmtTime(ts)}（${type==='in'?'上班':'落班'}）`, reason);
      await saveData();
      renderPunchesPanel();
    });
  });
  $p.querySelectorAll('[data-delpunch]').forEach(b=>{
    b.addEventListener('click', ()=>{
      const punch = DATA.punches.find(p=>p.id===b.dataset.delpunch);
      if(!punch) return;
      showConfirm('刪除打咭紀錄', '確定刪除呢筆打咭紀錄？原始紀錄一刪除就攞唔返（但呢次刪除會記落「操作紀錄」）。', ()=>{

          DATA.punches = DATA.punches.filter(p=>p.id!==punch.id);

          await saveData();
          renderPunchesPanel();
        });
      }, '刪除');
    });
  });
}

// ==================== 更份配對 (in/out → shift) ====================
function computeShifts(empId, fromTs, toTs){
  const list = DATA.punches.filter(p=>p.employeeId===empId).sort((a,b)=>a.ts-b.ts);
  const shifts = [];
  let openIn = null;
  for(const p of list){
    if(p.type==='in'){ openIn = p; }
    else if(p.type==='out' && openIn){
      shifts.push({ inTs: openIn.ts, outTs: p.ts });
      openIn = null;
    }
  }
  if(openIn){ shifts.push({ inTs: openIn.ts, outTs: null }); }
  // 一更歸邊一日／邊個報表期，睇返「開更」嗰一刻，唔理做到幾時完（同BC ESA
  // 「紅日睇開更當日」嘅原則一致）。用開更時間篩選，先唔會夜更跨午夜/跨月尾
  // 出現兩張報表都計咗一次，或者兩張都漏咗嘅情況。
  return shifts.filter(s => s.inTs >= fromTs && s.inTs <= toTs);
}

function buildReport(){
  const fromStr = document.getElementById('fromDate').value;
  const toStr = document.getElementById('toDate').value;
  const empFilter = document.getElementById('empFilter').value;
  if(!fromStr || !toStr){
    document.getElementById('reportOutput').innerHTML = '<div class="hint">請填齊「由」同「到」日期。</div>';
    return;
  }
  const fromTs = parseVanDateStr(fromStr);
  const toTs = parseVanDateEndStr(toStr);
  if(isNaN(fromTs) || isNaN(toTs) || fromTs > toTs){
    document.getElementById('reportOutput').innerHTML = '<div class="hint" style="color:var(--stamp-red);">日期範圍無效，「由」唔可以遲過「到」。</div>';
    return;
  }

  const targets = empFilter==='all' ? DATA.employees : DATA.employees.filter(e=>e.id===empFilter);
  const holidaysInRange = DATA.holidays
    .filter(h=>{ const t = parseVanDateStr(h.date); return t>=fromTs && t<=toTs; })
    .sort((a,b)=> a.date.localeCompare(b.date));

  let grandPay = 0;
  let blocksHtml = '';
  const csvRows = [['員工','類別','日期','假期名稱','詳情','平均日薪','工資($)']];

  targets.forEach(emp=>{
    const wage = emp.wage || 0;
    const reg = computeRegularPay(emp.id, fromTs, toTs, wage);

    const anomalies = detectAnomalies(emp.id).filter(a=> a.ts>=fromTs && a.ts<=toTs);
    const anomalyWarning = anomalies.length ? `
      <div class="hint" style="color:var(--stamp-red); margin-bottom:8px;">
        ⚠️ 呢段期間偵測到 ${anomalies.length} 個異常打咭：${anomalies.map(a=>a.detail).join('；')}。建議去「打咭記錄」檢查修正，先至準確。
      </div>` : '';
    const openWarning = reg.openDates.length ? `
      <div class="hint" style="margin-bottom:8px;">
        ⏳ ${reg.openDates.join('、')} 有更份未打「落班」，嗰更嘅時數暫時未計入以下工資（等打完落班先會計，避免報表用「而家」嘅時間不斷變動）。
      </div>` : '';

    let holidayRows = '';
    let holidayTotal = 0;
    holidaysInRange.forEach(h=>{
      const r = computeHolidayPay(emp, h.date);
      holidayTotal += r.pay;
      holidayRows += `
        <tr>
          <td class="mono">${h.date}</td>
          <td>${escapeHtml(h.name||'')}</td>
          <td>${r.status}</td>
          <td class="mono">${wage? '$'+r.avgDayPay.toFixed(2) : '—'}</td>
          <td class="mono">${wage? '$'+r.pay.toFixed(2) : '—'}</td>
        </tr>`;
      csvRows.push([ emp.name, '紅日', h.date, h.name||'', r.status, wage?r.avgDayPay.toFixed(2):'', wage?r.pay.toFixed(2):'' ]);
    });

    const empTotalPay = reg.pay + holidayTotal;
    grandPay += empTotalPay;
    csvRows.push([ emp.name, '一般上班合計', '', '', `正常${reg.totalReg.toFixed(1)}h／1.5倍${reg.totalOt15.toFixed(1)}h／2倍${reg.totalOt2.toFixed(1)}h`, '', wage?reg.pay.toFixed(2):'' ]);
    csvRows.push([ emp.name, '員工合計', '', '', '', '', wage?empTotalPay.toFixed(2):'' ]);

    blocksHtml += `
      <div class="panel" style="margin-bottom:22px;">
        <div style="font-weight:800; font-size:15.5px; margin-bottom:8px;">${escapeHtml(emp.name)}
          <span class="hint" style="display:inline;">　${wage? '時薪 $'+wage.toFixed(2) : '（未設定時薪，只顯示時數）'}</span>
        </div>
        ${anomalyWarning}
        ${openWarning}
        <div class="summary-card">
          <div class="item"><div class="num">${reg.totalReg.toFixed(1)}h</div><div class="lbl">正常時數</div></div>
          <div class="item"><div class="num">${reg.totalOt15.toFixed(1)}h</div><div class="lbl">1.5倍時數</div></div>
          <div class="item"><div class="num">${reg.totalOt2.toFixed(1)}h</div><div class="lbl">2倍時數</div></div>
          <div class="item"><div class="num">${wage? '$'+reg.pay.toFixed(2) : reg.totalHours.toFixed(1)+'h'}</div><div class="lbl">一般上班${wage?'工資':'時數'}</div></div>
          ${holidaysInRange.length? `<div class="item"><div class="num">${wage? '$'+holidayTotal.toFixed(2) : '—'}</div><div class="lbl">紅日工資</div></div>`:''}
          <div class="item"><div class="num">${wage? '$'+empTotalPay.toFixed(2) : '—'}</div><div class="lbl">合計</div></div>
        </div>
        ${holidaysInRange.length ? `
          <table>
            <thead><tr><th>紅日</th><th>名稱</th><th>狀況</th><th>平均日薪</th><th>當日工資</th></tr></thead>
            <tbody>${holidayRows}</tbody>
          </table>
        ` : ''}
      </div>
    `;
  });

  document.getElementById('reportOutput').innerHTML = `
    ${targets.length ? `
      <div class="summary-card" style="margin-bottom:22px;">
        <div class="item"><div class="num">${targets.length}</div><div class="lbl">員工</div></div>
        <div class="item"><div class="num">$${grandPay.toFixed(2)}</div><div class="lbl">全部合計工資</div></div>
      </div>
      ${blocksHtml}
      <div class="hint">
        每日加班：超過8小時嘅頭4小時×1.5，超過12小時部份×2。每週加班：一星期（日曆星期日起計）正常時數超過40小時，超出部份×1.5，同一段時數如已因每日規則攞緊更高倍數就唔會重複計。<br>
        紅日：資格＝受僱滿30曆日＋之前30日內有15日做嘢；平均日薪＝之前30日正常工資（不計加班費）÷ 實際做嘢日數。<br>
        每一更歸邊個報表期，睇返「開更」嗰一刻（唔理做到幾時完），所以夜更跨月尾都唔會計多或者漏計。如有疑問建議對照BC僱傭標準處資料再核實。
      </div>
    ` : '<div class="hint">未有員工資料</div>'}
  `;
  lastReportRows = targets.length ? csvRows : null;
}

// ==================== PWA: 註冊 service worker（有先用，冇就算，唔影響app本身） ====================
// service worker一定要真正hosting（https或者localhost）先會生效，
// 直接喺iPad度用Files app開個.html檔案（file://）會註冊唔到，係預期之內、唔會報錯畀用戶睇到。
if('serviceWorker' in navigator && (location.protocol==='https:' || location.hostname==='localhost')){
  window.addEventListener('load', ()=>{
    navigator.serviceWorker.register('./service-worker.js').catch((err)=>{
      console.warn('Service worker 註冊唔到（如果冇同時host埋service-worker.js呢個檔案係正常嘅，唔影響app用）', err);
    });
  });
}
